<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรม Support - CJ Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-md border-b-4 border-orange-500 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2">
                        <img src="img/img2.png" alt="Logo" class="w-10 h-10 rounded-lg object-contain bg-white">
                        <div><h1 class="font-bold text-xl text-gray-900 leading-tight">CJ Manufacturing</h1></div>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">หน้าแรก</a>
                    <a href="manuals.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">คู่มือการใช้งาน</a>
                    <a href="software.html" class="px-3 py-2 rounded-md text-sm font-medium bg-orange-50 text-orange-600 border border-orange-200 transition">โปรแกรม Support</a>
                    <a href="staff.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">ข้อมูลพนักงาน</a>
                    <a href="assets.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">ระบบจัดการ Asset</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold"><i class="fa-solid fa-download text-orange-500 mr-2"></i> โปรแกรม Support</h2>
            <button onclick="openModal('softwareModal')" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> เพิ่มโปรแกรม</button>
        </div>

        <div class="flex gap-4 mb-4 border-b">
            <button onclick="setSoftwareCategory('install')" id="tab-soft-install" class="px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold">โปรแกรม Install ทั่วไป</button>
            <button onclick="setSoftwareCategory('dept')" id="tab-soft-dept" class="px-4 py-2 text-gray-500 hover:text-orange-500 font-bold">โปรแกรมเฉพาะแผนก</button>
        </div>

        <div class="bg-white rounded-lg shadow border border-gray-100 overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr id="softwareTableHeader"></tr>
                </thead>
                <tbody id="softwareTableBody" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal -->
    <div id="softwareModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
            <div class="flex justify-between mb-4 border-b pb-2">
                <h3 class="font-bold text-lg">จัดการโปรแกรม</h3>
                <button onclick="closeModal('softwareModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="softwareForm" onsubmit="saveSoftware(event)" class="space-y-4">
                <input type="hidden" id="softwareId">
                <div>
                    <label class="block text-sm font-medium mb-1">หมวดหมู่</label>
                    <select id="softwareType" class="w-full border p-2 rounded" onchange="toggleSoftwareFields()">
                        <option value="install">โปรแกรม Install ทั่วไป</option>
                        <option value="dept">โปรแกรมเฉพาะแผนก</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1">ชื่อโปรแกรม</label><input type="text" id="softwareName" required class="w-full border p-2 rounded"></div>
                
                <div id="softInstallFields">
                    <div><label class="block text-sm font-medium mb-1">เวอร์ชั่น</label><input type="text" id="softwareVersion" class="w-full border p-2 rounded"></div>
                    <div>
                        <label class="block text-sm font-medium mb-1">แนบไฟล์ (.exe / .zip)</label>
                        <input type="file" id="softwareFileInput" onchange="encodeFileAsURL(this, 'softwareBase64')" class="w-full border p-2 rounded text-sm">
                        <input type="hidden" id="softwareBase64">
                    </div>
                </div>

                <div id="softDeptFields" class="hidden">
                    <div><label class="block text-sm font-medium mb-1">แผนก</label><input type="text" id="softwareDept" class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-medium mb-1">ชื่อ-นามสกุล เจ้าของโปรแกรม</label><input type="text" id="softwareOwner" class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm font-medium mb-1">เวอร์ชั่น</label><input type="text" id="softwareVersion" class="w-full border p-2 rounded"></div>
                      <div>
                        <label class="block text-sm font-medium mb-1">แนบไฟล์ (.exe / .zip)</label>
                        <input type="file" id="softwareFileInput" onchange="encodeFileAsURL(this, 'softwareBase64')" class="w-full border p-2 rounded text-sm">
                        <input type="hidden" id="softwareBase64">                  
                </div>

                <div class="text-right"><button type="submit" class="bg-orange-500 text-white px-4 py-2 rounded">บันทึก</button></div>
            </form>
        </div>
    </div>

    <script>
        var softwares = JSON.parse(localStorage.getItem('it_softwares')) || [];
        let curSoftCat = 'install';

        function openModal(id) { 
            document.getElementById(id).classList.remove('hidden'); 
            document.getElementById('softwareForm').reset();
            document.getElementById('softwareId').value = '';
            toggleSoftwareFields();
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function encodeFileAsURL(element, hiddenInputId) {
            const file = element.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = function() { document.getElementById(hiddenInputId).value = reader.result; }
                reader.readAsDataURL(file);
            }
        }

        function setSoftwareCategory(cat) {
            curSoftCat = cat;
            document.getElementById('tab-soft-install').className = cat === 'install' ? "px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold" : "px-4 py-2 text-gray-500 hover:text-orange-500 font-bold";
            document.getElementById('tab-soft-dept').className = cat === 'dept' ? "px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold" : "px-4 py-2 text-gray-500 hover:text-orange-500 font-bold";
            renderSoftware();
        }

        function toggleSoftwareFields() {
            const type = document.getElementById('softwareType').value;
            document.getElementById('softInstallFields').style.display = type === 'install' ? 'block' : 'none';
            document.getElementById('softDeptFields').style.display = type === 'dept' ? 'block' : 'none';
        }

        function renderSoftware() {
            const tbody = document.getElementById('softwareTableBody');
            const thead = document.getElementById('softwareTableHeader');
            tbody.innerHTML = '';
            
            if(curSoftCat === 'install') {
                thead.innerHTML = `<th>ชื่อโปรแกรม</th><th>เวอร์ชั่น</th><th class="text-right">จัดการ</th>`;
            } else {
                thead.innerHTML = `<th>ชื่อโปรแกรม</th><th>แผนก</th><th>ชื่อ-นามสกุล เจ้าของ</th><th class="text-right">จัดการ</th>`;
            }
            thead.querySelectorAll('th').forEach(th => th.className = "px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase");
            thead.lastChild.className = "px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase";

            const filtered = softwares.filter(s => s.type === curSoftCat);
            if(filtered.length === 0) tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-gray-400">ไม่มีข้อมูล</td></tr>`;

            filtered.forEach(s => {
                let row = curSoftCat === 'install' 
                    ? `<td class="px-4 py-3 font-medium"><i class="fa-solid fa-file-archive text-orange-400 mr-2"></i>${s.name}</td><td class="px-4 py-3">${s.version}</td>`
                    : `<td class="px-4 py-3 font-medium"><i class="fa-solid fa-laptop-code text-blue-500 mr-2"></i>${s.name}</td><td class="px-4 py-3">${s.dept}</td><td class="px-4 py-3">${s.owner}</td>`;
                
                tbody.innerHTML += `<tr class="hover:bg-gray-50">${row}
                    <td class="px-4 py-3 text-right whitespace-nowrap">
                        ${s.file ? `<a href="${s.file}" download="${s.name}" class="text-green-600 hover:bg-green-50 px-2 py-1 rounded mr-1"><i class="fa-solid fa-download"></i> โหลด</a>` : ''}
                        <button onclick="editSoftware(${s.id})" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded mr-1"><i class="fa-solid fa-pen"></i> แก้ไข</button>
                        <button onclick="deleteSoftware(${s.id})" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded"><i class="fa-solid fa-trash"></i> ลบ</button>
                    </td></tr>`;
            });
        }

        function saveSoftware(e) {
            e.preventDefault();
            const idVal = document.getElementById('softwareId').value;
            const type = document.getElementById('softwareType').value;
            const newItem = {
                id: idVal ? parseInt(idVal) : Date.now(),
                type: type,
                name: document.getElementById('softwareName').value,
                version: type === 'install' ? document.getElementById('softwareVersion').value : '',
                file: type === 'install' ? document.getElementById('softwareBase64').value : '',
                dept: type === 'dept' ? document.getElementById('softwareDept').value : '',
                owner: type === 'dept' ? document.getElementById('softwareOwner').value : ''
            };
            if(idVal) softwares = softwares.map(m => m.id == idVal ? newItem : m);
            else softwares.unshift(newItem);
            
            localStorage.setItem('it_softwares', JSON.stringify(softwares));
            closeModal('softwareModal'); 
            setSoftwareCategory(type);
        }

        function editSoftware(id) {
            const s = softwares.find(x => x.id === id);
            document.getElementById('softwareId').value = s.id;
            document.getElementById('softwareType').value = s.type;
            document.getElementById('softwareName').value = s.name;
            document.getElementById('softwareVersion').value = s.version || '';
            document.getElementById('softwareDept').value = s.dept || '';
            document.getElementById('softwareOwner').value = s.owner || '';
            document.getElementById('softwareBase64').value = s.file || '';
            toggleSoftwareFields();
            document.getElementById('softwareModal').classList.remove('hidden');
        }

        function deleteSoftware(id) {
            if(confirm('ยืนยันการลบข้อมูลนี้ใช่หรือไม่?')) {
                softwares = softwares.filter(x => x.id !== id);
                localStorage.setItem('it_softwares', JSON.stringify(softwares));
                renderSoftware();
            }
        }

        window.onload = renderSoftware;
    </script>
</body>
</html>
