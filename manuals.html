<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คู่มือการใช้งาน - CJ Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-md border-b-4 border-orange-500 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2">
                        <img src="img/img2.png" alt="Logo" class="w-10 h-10 rounded-lg object-contain bg-white">
                        <div><h1 class="font-bold text-xl text-gray-900 leading-tight">CJ Manufacturing</h1></div>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">หน้าแรก</a>
                    <a href="manuals.html" class="px-3 py-2 rounded-md text-sm font-medium bg-orange-50 text-orange-600 border border-orange-200 transition">คู่มือการใช้งาน</a>
                    <a href="software.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">โปรแกรม Support</a>
                    <a href="staff.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">ข้อมูลพนักงาน</a>
                    <a href="assets.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">ระบบจัดการ Asset</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h2 class="text-2xl font-bold"><i class="fa-solid fa-book-open text-orange-500 mr-2"></i> คู่มือการใช้งาน</h2>
            <button onclick="openModal('manualModal')" class="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm"><i class="fa-solid fa-plus"></i> เพิ่มคู่มือ</button>
        </div>
        
        <div class="flex gap-4 mb-4 border-b">
            <button onclick="setManualCategory('video')" id="tab-manual-video" class="px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold">หมวดหมู่วิดีโอ</button>
            <button onclick="setManualCategory('image')" id="tab-manual-image" class="px-4 py-2 text-gray-500 hover:text-orange-500 font-bold">หมวดหมู่รูปภาพ</button>
        </div>

        <div id="manualContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <!-- Modal -->
    <div id="manualModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
            <div class="flex justify-between mb-4 border-b pb-2">
                <h3 class="font-bold text-lg">จัดการคู่มือ</h3>
                <button onclick="closeModal('manualModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="manualForm" onsubmit="saveManual(event)" class="space-y-4">
                <input type="hidden" id="manualId">
                <div>
                    <label class="block text-sm font-medium mb-1">หมวดหมู่</label>
                    <select id="manualType" class="w-full border p-2 rounded">
                        <option value="video">วิดีโอ (Video)</option>
                        <option value="image">รูปภาพ (Image/Text)</option>
                    </select>
                </div>
                <div><label class="block text-sm font-medium mb-1">หัวข้อคู่มือ</label><input type="text" id="manualTitle" required class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm font-medium mb-1">รายละเอียด</label><textarea id="manualDesc" class="w-full border p-2 rounded"></textarea></div>
                <div>
                    <label class="block text-sm font-medium mb-1">อัพโหลดไฟล์ (รูป/วิดีโอ)</label>
                    <input type="file" id="manualFileInput" onchange="encodeFileAsURL(this, 'manualBase64')" class="w-full border p-2 rounded text-sm" accept="image/*,video/*">
                    <input type="hidden" id="manualBase64">
                </div>
                <div class="text-right"><button type="submit" class="bg-orange-500 text-white px-4 py-2 rounded">บันทึก</button></div>
            </form>
        </div>
    </div>

    <script>
        var manuals = JSON.parse(localStorage.getItem('it_manuals')) || [];
        let curManCat = 'video';

        function openModal(id) { 
            document.getElementById(id).classList.remove('hidden'); 
            document.getElementById('manualForm').reset();
            document.getElementById('manualId').value = '';
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function encodeFileAsURL(element, hiddenInputId) {
            const file = element.files[0];
            if (file) {
                if(file.size > 5 * 1024 * 1024) alert("คำเตือน: ไฟล์ใหญ่กว่า 5MB อาจทำให้พื้นที่ Local Storage เต็มได้");
                const reader = new FileReader();
                reader.onloadend = function() { document.getElementById(hiddenInputId).value = reader.result; }
                reader.readAsDataURL(file);
            }
        }

        function setManualCategory(cat) {
            curManCat = cat;
            document.getElementById('tab-manual-video').className = cat === 'video' ? "px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold" : "px-4 py-2 text-gray-500 hover:text-orange-500 font-bold";
            document.getElementById('tab-manual-image').className = cat === 'image' ? "px-4 py-2 border-b-2 border-orange-500 text-orange-600 font-bold" : "px-4 py-2 text-gray-500 hover:text-orange-500 font-bold";
            renderManuals();
        }

        function renderManuals() {
            const container = document.getElementById('manualContainer');
            container.innerHTML = '';
            const filtered = manuals.filter(m => m.type === curManCat);
            if(filtered.length === 0) container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-8">ไม่มีข้อมูล</p>';
            
            filtered.forEach(m => {
                let mediaHtml = m.image ? (m.type === 'video' ? `<video src="${m.image}" controls class="w-full h-40 object-cover bg-black"></video>` : `<img src="${m.image}" class="w-full h-40 object-cover">`) : `<div class="h-40 bg-gray-200 flex items-center justify-center text-gray-400">ไม่มีไฟล์แนบ</div>`;
                container.innerHTML += `
                    <div class="bg-white rounded-lg shadow border overflow-hidden">
                        ${mediaHtml}
                        <div class="p-4">
                            <h3 class="font-bold text-lg mb-1">${m.title}</h3>
                            <p class="text-sm text-gray-500 mb-3">${m.desc}</p>
                            <div class="flex justify-end gap-2">
                                <button onclick="editManual(${m.id})" class="text-blue-500 hover:bg-blue-50 px-2 py-1 rounded"><i class="fa-solid fa-pen"></i> แก้ไข</button>
                                <button onclick="deleteManual(${m.id})" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded"><i class="fa-solid fa-trash"></i> ลบ</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function saveManual(e) {
            e.preventDefault();
            const idVal = document.getElementById('manualId').value;
            const newItem = {
                id: idVal ? parseInt(idVal) : Date.now(),
                type: document.getElementById('manualType').value,
                title: document.getElementById('manualTitle').value,
                desc: document.getElementById('manualDesc').value,
                image: document.getElementById('manualBase64').value
            };
            if(idVal) manuals = manuals.map(m => m.id == idVal ? newItem : m);
            else manuals.unshift(newItem);
            
            localStorage.setItem('it_manuals', JSON.stringify(manuals));
            closeModal('manualModal'); 
            setManualCategory(newItem.type);
        }

        function editManual(id) {
            const m = manuals.find(x => x.id === id);
            document.getElementById('manualId').value = m.id;
            document.getElementById('manualType').value = m.type;
            document.getElementById('manualTitle').value = m.title;
            document.getElementById('manualDesc').value = m.desc;
            document.getElementById('manualBase64').value = m.image || '';
            document.getElementById('manualModal').classList.remove('hidden');
        }

        function deleteManual(id) {
            if(confirm('ยืนยันการลบข้อมูลนี้ใช่หรือไม่?')) {
                manuals = manuals.filter(x => x.id !== id);
                localStorage.setItem('it_manuals', JSON.stringify(manuals));
                renderManuals();
            }
        }

        window.onload = renderManuals;
    </script>
</body>
</html>
