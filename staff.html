<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลพนักงาน - CJ Manufacturing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-md border-b-4 border-orange-500 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2">
                        <img src="img/img2.png" alt="Logo" class="w-10 h-10 rounded-lg object-contain bg-white">
                        <div><h1 class="font-bold text-xl text-gray-900 leading-tight">CJ Manufacturing</h1></div>
                    </a>
                </div>
                <div class="hidden md:flex items-center space-x-1">
                    <a href="index.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">หน้าแรก</a>
                    <a href="manuals.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">คู่มือการใช้งาน</a>
                    <a href="software.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">โปรแกรม Support</a>
                    <a href="staff.html" class="px-3 py-2 rounded-md text-sm font-medium bg-orange-50 text-orange-600 border border-orange-200 transition">ข้อมูลพนักงาน</a>
                    <a href="assets.html" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-orange-50 hover:text-orange-600 transition">ระบบจัดการ Asset</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="flex flex-wrap justify-between items-center mb-4 border-b pb-4 gap-4">
            <h2 class="text-2xl font-bold w-full md:w-auto"><i class="fa-solid fa-users text-orange-500 mr-2"></i> ข้อมูลพนักงาน</h2>
            <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
                <div class="relative flex-grow md:w-64">
                    <input type="text" id="staffSearchInput" onkeyup="renderStaff()" placeholder="ค้นหาชื่อ, แผนก..." class="border pl-10 pr-3 py-2 rounded-lg w-full text-sm focus:outline-none focus:ring-1 focus:ring-orange-500">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                
                <label class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg text-sm transition cursor-pointer mb-0 flex items-center justify-center gap-1">
                    <i class="fa-solid fa-file-excel"></i> Import Excel
                    <input type="file" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" class="hidden" onchange="handleImportStaffExcel(event)">
                </label>

                <button onclick="openStaffModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-3 py-2 rounded-lg text-sm transition"><i class="fa-solid fa-plus"></i> เพิ่มพนักงาน</button>
            </div>
        </div>

        <div class="mb-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-orange-100 p-6 flex flex-col justify-center bg-gradient-to-br from-orange-50 to-white">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 bg-orange-500 text-white rounded-full flex items-center justify-center text-xl shadow-md">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-gray-800">พนักงานทั้งหมด</h3>
                        <p class="text-sm text-gray-500">จำแนกตามแผนก</p>
                    </div>
                </div>
                <div class="text-center">
                    <span id="totalStaffCount" class="text-6xl font-black text-orange-600">0</span>
                    <span class="text-gray-500 ml-1 font-bold">คน</span>
                </div>
            </div>
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-4 h-80 flex items-center justify-center">
                <canvas id="staffDeptChart"></canvas>
            </div>
        </div>

        <div id="staffContainer" class="space-y-6"></div>
    </main>

    <!-- Modal -->
    <div id="staffModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
            <div class="flex justify-between mb-4 border-b pb-2">
                <h3 class="font-bold text-lg">จัดการข้อมูลพนักงาน</h3>
                <button onclick="closeModal('staffModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="staffForm" onsubmit="saveStaff(event)" class="space-y-4">
                <input type="hidden" id="staffId">
                <div><label class="block text-sm font-medium mb-1">ชื่อ-นามสกุล</label><input type="text" id="staffName" required class="w-full border p-2 rounded"></div>
                <div>
                    <label class="block text-sm font-medium mb-1">ตำแหน่ง / แผนก</label>
                    <select id="staffPosSelect" class="w-full border p-2 rounded mb-2" onchange="toggleStaffNewDept()" required></select>
                    <input type="text" id="staffPosNew" placeholder="พิมพ์ชื่อตำแหน่ง / แผนกใหม่..." class="w-full border p-2 rounded hidden">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">รูปถ่ายพนักงาน</label>
                    <img id="staffPreview" class="h-20 w-20 object-cover rounded-full mb-2 hidden bg-gray-100">
                    <input type="file" id="staffImg" accept="image/*" onchange="encodeFileAsURL(this, 'staffBase64', 'staffPreview')" class="w-full border p-2 rounded text-sm">
                    <input type="hidden" id="staffBase64">
                </div>
                <div class="text-right"><button type="submit" class="bg-orange-500 text-white px-4 py-2 rounded">บันทึก</button></div>
            </form>
        </div>
    </div>

    <script>
        var staffs = JSON.parse(localStorage.getItem('it_staffs')) || [];
        let staffChartInstance = null;

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function encodeFileAsURL(element, hiddenInputId, previewImgId) {
            const file = element.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    document.getElementById(hiddenInputId).value = reader.result;
                    if(previewImgId) {
                        const preview = document.getElementById(previewImgId);
                        preview.src = reader.result;
                        preview.classList.remove('hidden');
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function openStaffModal() {
            document.getElementById('staffForm').reset();
            document.getElementById('staffId').value = '';
            document.getElementById('staffPreview').classList.add('hidden');
            populateStaffFormDepts();
            toggleStaffNewDept();
            openModal('staffModal');
        }

        function populateStaffFormDepts() {
            const select = document.getElementById('staffPosSelect');
            const depts = [...new Set(staffs.map(s => s.pos ? s.pos.trim() : ''))].filter(Boolean).sort();
            
            let options = '<option value="">-- เลือกแผนก --</option>';
            depts.forEach(d => { options += `<option value="${d}">${d}</option>`; });
            options += '<option value="NEW_DEPT" class="text-orange-500 font-bold">+ เพิ่มแผนกใหม่...</option>';
            select.innerHTML = options;
        }

        function toggleStaffNewDept() {
            const selectVal = document.getElementById('staffPosSelect').value;
            const newDeptInput = document.getElementById('staffPosNew');
            if (selectVal === 'NEW_DEPT') {
                newDeptInput.classList.remove('hidden');
                newDeptInput.required = true;
            } else {
                newDeptInput.classList.add('hidden');
                newDeptInput.required = false;
                newDeptInput.value = '';
            }
        }

        function renderStaffDashboard(groupedData) {
            document.getElementById('totalStaffCount').innerText = staffs.length;
            const ctx = document.getElementById('staffDeptChart');
            if(!ctx) return;
            if (staffChartInstance) staffChartInstance.destroy();

            const labels = Object.keys(groupedData).sort();
            const data = labels.map(label => groupedData[label].length);
            const bgColors = labels.map((_, i) => `hsl(${(i * 360 / Math.max(labels.length, 1)) % 360}, 75%, 60%)`);

            staffChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'จำนวนพนักงาน (คน)',
                        data: data,
                        backgroundColor: bgColors,
                        borderWidth: 2,
                        borderColor: '#ffffff',
                        hoverOffset: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { font: { family: "'Prompt', sans-serif", size: 11 }, boxWidth: 15, padding: 10 } }
                    },
                    layout: { padding: 10 }
                }
            });
        }

        function renderStaff() {
            const container = document.getElementById('staffContainer');
            container.innerHTML = '';
            const term = (document.getElementById('staffSearchInput')?.value || '').toLowerCase();
            
            const filteredStaffs = staffs.filter(s => (s.name || '').toLowerCase().includes(term) || (s.pos || '').toLowerCase().includes(term));

            const globalGrouped = {};
            staffs.forEach(s => {
                const dept = s.pos ? s.pos.trim() : 'ไม่ระบุแผนก';
                if(!globalGrouped[dept]) globalGrouped[dept] = [];
                globalGrouped[dept].push(s);
            });
            
            renderStaffDashboard(globalGrouped);

            if(filteredStaffs.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-8">ไม่มีข้อมูลพนักงาน</p>';
                return;
            }
            
            const filteredGrouped = {};
            filteredStaffs.forEach(s => {
                const dept = s.pos ? s.pos.trim() : 'ไม่ระบุแผนก';
                if(!filteredGrouped[dept]) filteredGrouped[dept] = [];
                filteredGrouped[dept].push(s);
            });

            Object.keys(filteredGrouped).sort().forEach(dept => {
                let html = `<div class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-l-4 border-orange-500 pl-3">${dept} <span class="text-sm font-normal text-gray-500">(${filteredGrouped[dept].length} คน)</span></h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">`;
                
                filteredGrouped[dept].forEach(s => {
                    let imgHtml = s.img ? `<img src="${s.img}" class="w-20 h-20 mx-auto -mt-10 rounded-full border-4 border-white object-cover shadow-sm">` : `<div class="w-20 h-20 mx-auto -mt-10 rounded-full border-4 border-white bg-gray-200 flex items-center justify-center shadow-sm"><i class="fa-solid fa-user text-3xl text-gray-400"></i></div>`;
                    html += `
                        <div class="bg-gray-50 rounded-xl border text-center relative hover:shadow-md transition pt-10 px-4 pb-4 mt-8">
                            ${imgHtml}
                            <h3 class="font-bold text-lg mt-2">${s.name}</h3>
                            <p class="text-orange-500 text-sm font-medium">${s.pos}</p>
                            <div class="mt-4 border-t border-gray-200 pt-2 flex justify-center gap-2">
                                <button onclick="editStaff(${s.id})" class="text-blue-500 hover:bg-blue-100 px-2 py-1 rounded text-sm transition"><i class="fa-solid fa-pen"></i> แก้ไข</button>
                                <button onclick="deleteStaff(${s.id})" class="text-red-500 hover:bg-red-100 px-2 py-1 rounded text-sm transition"><i class="fa-solid fa-trash"></i> ลบ</button>
                            </div>
                        </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function saveStaff(e) {
            e.preventDefault();
            const idVal = document.getElementById('staffId').value;
            const selectVal = document.getElementById('staffPosSelect').value;
            const posToSave = (selectVal === 'NEW_DEPT') ? document.getElementById('staffPosNew').value : selectVal;

            const newItem = {
                id: idVal ? parseInt(idVal) : Date.now(),
                name: document.getElementById('staffName').value,
                pos: posToSave,
                img: document.getElementById('staffBase64').value
            };

            if(idVal) staffs = staffs.map(m => m.id == idVal ? newItem : m);
            else staffs.unshift(newItem);

            localStorage.setItem('it_staffs', JSON.stringify(staffs));
            closeModal('staffModal'); renderStaff();
        }

        function editStaff(id) {
            const s = staffs.find(x => x.id === id);
            document.getElementById('staffId').value = s.id;
            document.getElementById('staffName').value = s.name;
            document.getElementById('staffBase64').value = s.img || '';
            if(s.img) {
                document.getElementById('staffPreview').src = s.img;
                document.getElementById('staffPreview').classList.remove('hidden');
            } else {
                document.getElementById('staffPreview').classList.add('hidden');
            }

            populateStaffFormDepts();
            const select = document.getElementById('staffPosSelect');
            const optionExists = Array.from(select.options).some(opt => opt.value === s.pos);
            if(optionExists) {
                select.value = s.pos;
                toggleStaffNewDept();
            } else {
                select.value = 'NEW_DEPT';
                toggleStaffNewDept();
                document.getElementById('staffPosNew').value = s.pos;
            }
            openModal('staffModal');
        }

        function deleteStaff(id) {
            if(confirm('ยืนยันการลบข้อมูลนี้ใช่หรือไม่?')) {
                staffs = staffs.filter(x => x.id !== id);
                localStorage.setItem('it_staffs', JSON.stringify(staffs));
                renderStaff();
            }
        }

        function handleImportStaffExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1, raw: false}); 
                    
                    if (jsonData.length < 2) return alert("ไฟล์ไม่มีข้อมูล");

                    const headers = jsonData[0].map(h => h ? h.toString().trim() : '');
                    const getIdx = (name) => headers.findIndex(h => h === name);
                    const idxName = getIdx("ชื่อ-นามสกุล");
                    let idxPos = getIdx("ตำแหน่ง / แผนก");
                    if (idxPos === -1) idxPos = getIdx("แผนก"); 
                    if (idxPos === -1) idxPos = getIdx("หน่วยงาน / แผนก");
                    
                    if (idxName === -1) return alert("รูปแบบไฟล์ไม่ถูกต้อง ต้องมีคอลัมน์ 'ชื่อ-นามสกุล'");

                    let importedCount = 0;
                    const newStaffs = [];
                    for (let i = 1; i < jsonData.length; i++) {
                        if (!jsonData[i] || !jsonData[i][idxName]) continue;
                        newStaffs.push({
                            id: Date.now() + i, 
                            name: jsonData[i][idxName].toString().trim(),
                            pos: idxPos !== -1 && jsonData[i][idxPos] ? jsonData[i][idxPos].toString().trim() : 'ไม่ระบุแผนก',
                            img: '' 
                        });
                        importedCount++;
                    }

                    if (importedCount > 0) {
                        staffs = [...newStaffs.reverse(), ...staffs]; 
                        localStorage.setItem('it_staffs', JSON.stringify(staffs));
                        renderStaff(); 
                        alert(`นำเข้าสำเร็จ ${importedCount} รายการ!`);
                    }
                } catch (err) { console.error(err); alert("เกิดข้อผิดพลาดในการอ่านไฟล์"); }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = ''; 
        }

        window.onload = renderStaff;
    </script>
</body>
</html>
